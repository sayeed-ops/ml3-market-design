<!-- modal host -->
<div id="ovl-root" class="ovl is-hidden"></div>

<script>
(function () {
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function svg(p){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>'; }
  var PRIMARY = 'EUR';

  // currencies already in the workspace (EUR = primary/base, no actions).
  // "name" is free-text, exactly as entered on the New currency form.
  var CURRENCIES = [
    { name:'Euro',              rate:1,      primary:true },
    { name:'US Dollar',         rate:0.92,   primary:false },
    { name:'British Pound',     rate:1.17,   primary:false },
    { name:'Japanese Yen',      rate:0.0061, primary:false },
    { name:'Australian Dollar', rate:0.60,   primary:false },
    { name:'Canadian Dollar',   rate:0.67,   primary:false },
    { name:'Indian Rupee',      rate:0.011,  primary:false },
    { name:'Swedish Krona',     rate:0.087,  primary:false }
  ];
  var EMPTY = /(\?|&)empty\b/.test(location.search);

  var stage = document.getElementById('s-stage');
  var searchwrap = document.getElementById('s-searchwrap');

  function render(){
    if (EMPTY || CURRENCIES.length === 0){
      searchwrap.style.visibility = 'hidden';
      stage.innerHTML =
        '<div class="m-table-card"><div class="s-empty">' +
          '<div class="s-empty__icon">' + svg('<circle cx="12" cy="12" r="9"/><path d="M14.5 9a2.5 2.5 0 0 0-2.5-1.5c-1.5 0-2.5 1-2.5 2.25S10.5 12 12 12s2.5.75 2.5 2.25S13.5 16.5 12 16.5A2.5 2.5 0 0 1 9.5 15M12 6v1.5M12 16.5V18"/>') + '</div>' +
          '<div class="s-empty__title">No currencies yet</div>' +
          '<div class="s-empty__sub">Add a currency and set its conversion rate to start pricing media in more than one currency.</div>' +
          '<button class="btn btn--primary btn--sm" id="s-empty-new"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> New currency</button>' +
        '</div></div>';
      document.getElementById('s-empty-new').addEventListener('click', openAdd);
      return;
    }
    searchwrap.style.visibility = 'visible';
    var rows = CURRENCIES.map(function(c, i){
      return '<tr class="data-row" data-idx="' + i + '">' +
        '<td><span class="c-fullname">' + esc(c.name) + '</span></td>' +
        '<td><span class="c-rate">' + c.rate + '</span></td>' +
        '<td>' + (c.primary ? '<span class="badge-primary">' + svg('<path d="m5 12 5 5 9-11"/>') + 'Primary</span>' : '<span class="muted">—</span>') + '</td>' +
        '<td class="tc">' + (c.primary ? '' :
          '<button class="btn--iconxs s-rowmore" title="Actions"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>') + '</td>' +
      '</tr>';
    }).join('');
    stage.innerHTML =
      '<div class="m-table-card"><table class="m-table"><thead><tr>' +
        '<th>Currency</th><th style="width:200px">Conversion rate</th><th style="width:120px">Primary</th><th class="tc" style="width:56px"></th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>' +
      '<div class="s-foot"><span>' + CURRENCIES.length + ' currencies · primary ' + PRIMARY + '</span></div>';
  }

  // ---------- floating row menu (Update / Delete) ----------
  var openMenu = null;
  function closeMenu(){ if (openMenu){ openMenu.remove(); openMenu = null; } }
  function openRowMenu(btn, idx){
    closeMenu();
    var m = document.createElement('div');
    m.className = 'amenu';
    m.innerHTML =
      '<button class="amenu__item" data-act="update">' + svg('<path d="M3 2v6h6"/><path d="M21 12A9 9 0 0 0 6 5.3L3 8"/><path d="M21 22v-6h-6"/><path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/>') + 'Update rate</button>' +
      '<button class="amenu__item amenu__item--danger" data-act="delete">' + svg('<path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>') + 'Delete</button>';
    document.body.appendChild(m);
    var r = btn.getBoundingClientRect(), w = m.offsetWidth, h = m.offsetHeight;
    m.style.left = Math.max(8, Math.min(r.right - w, window.innerWidth - w - 8)) + 'px';
    m.style.top = ((r.bottom + h + 8 > window.innerHeight) ? r.top - h - 6 : r.bottom + 6) + 'px';
    m.addEventListener('click', function(e){ var it = e.target.closest('.amenu__item'); if (!it) return; closeMenu(); (it.dataset.act === 'update' ? openUpdate : openDelete)(idx); });
    openMenu = m;
  }
  document.addEventListener('click', function(e){
    var more = e.target.closest('.s-rowmore');
    if (more){ e.stopPropagation(); openRowMenu(more, +more.closest('tr').dataset.idx); return; }
    if (openMenu && !e.target.closest('.amenu')) closeMenu();
  });
  window.addEventListener('resize', closeMenu);
  window.addEventListener('scroll', closeMenu, true);

  // ---------- modal ----------
  var ovl = document.getElementById('ovl-root');
  function closeModal(){ ovl.classList.add('is-hidden'); ovl.innerHTML = ''; }
  ovl.addEventListener('click', function(e){ if (e.target === ovl || e.target.closest('[data-close]')) closeModal(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape'){ closeMenu(); closeModal(); } });

  function modal(opts){
    var danger = opts.danger;
    ovl.innerHTML =
      '<div class="modal" role="dialog" aria-modal="true">' +
        '<div class="modal__head"><div class="modal__htext"><div class="modal__title">' + esc(opts.title) + '</div>' +
          (opts.sub ? '<div class="modal__sub">' + opts.sub + '</div>' : '') + '</div>' +
          '<button class="modal__close" data-close aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>' +
        '<div class="modal__body">' + (opts.body || '') + '</div>' +
        (opts.noFoot ? '' :
        '<div class="modal__foot">' +
          '<button class="btn btn--ghost btn--sm" data-close>' + (opts.cancel || 'Cancel') + '</button>' +
          '<button class="btn ' + (danger ? '' : 'btn--primary') + ' btn--sm" id="modal-confirm"' + (danger ? ' style="background:var(--red);color:#fff"':'') + '>' + esc(opts.confirm) + '</button>' +
        '</div>') +
      '</div>';
    ovl.classList.remove('is-hidden');
    var c = document.getElementById('modal-confirm');
    if (c) c.addEventListener('click', function(){ if (opts.onConfirm) opts.onConfirm(); closeModal(); });
    if (opts.onMount) opts.onMount(ovl);
  }

  // ---------- flows ----------
  function openAdd(){
    modal({ title:'New currency', confirm:'Save',
      sub:'Please select the currency you want to add from the list below.',
      body:
        '<div class="field"><span class="field__label">Name</span>' +
          '<input class="input" type="text" /></div>' +
        '<div class="field"><span class="field__label">Conversion rate (to ' + PRIMARY + ')</span>' +
          '<input class="input" type="text" inputmode="decimal" /></div>' +
        '<div class="field__hint">Eg: If you select USD as a currency, you need to add how much ' + PRIMARY + ' is 1 USD.</div>' });
  }
  function openUpdate(idx){
    var c = CURRENCIES[idx];
    modal({ title:'Update currency', confirm:'Save',
      sub:'Set the conversion rate of <b>' + esc(c.name) + '</b> to ' + PRIMARY + '.',
      body: '<div class="field"><span class="field__label">Conversion rate (to ' + PRIMARY + ')</span>' +
        '<input class="input" type="text" inputmode="decimal" value="' + c.rate + '" /></div>' });
  }
  function openDelete(idx){
    var c = CURRENCIES[idx];
    modal({ danger:true, title:'Delete currency', confirm:'Yes, delete',
      body:'<div class="modal__sub" style="margin:0">Deleting the <b>' + esc(c.name) + '</b> will permanently remove it from the currency list. This action cannot be undone.</div>' });
  }

  document.getElementById('s-new').addEventListener('click', openAdd);
  document.getElementById('m-side-toggle').addEventListener('click', function(){ document.getElementById('m-sidebar').classList.toggle('is-collapsed'); });

  render();
})();
</script>
<script src="../system-ml3/usermenu.js"></script>
</body>
